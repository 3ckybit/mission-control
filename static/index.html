<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mission Control · Janet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#ffe9d6; --bg2:#e3c9ff; --bg3:#c3f0ff;
  --panel:#ffffffcc; --panel-border:#ffffff;
  --ink:#3a3355; --ink-dim:#8a83a3;
  --coral:#ff6b6b; --sun:#ffc93c; --mint:#4ecdc4; --sky:#5b9df9; --grape:#a06cd5;
  --shadow:0 8px 24px rgba(80,60,120,.14);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Nunito',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
body{
  background:linear-gradient(135deg,var(--bg1),var(--bg2) 55%,var(--bg3));
  background-attachment:fixed;
  min-height:100%;
  overflow-x:hidden;
}
#hud{min-height:100vh;display:grid;
  grid-template-columns:280px 1fr 300px;grid-template-rows:64px 1fr 210px;
  grid-template-areas:"top top top" "left core right" "chat chat chat";gap:16px;padding:16px}
.panel{background:var(--panel);border:2px solid var(--panel-border);border-radius:22px;
  box-shadow:var(--shadow);backdrop-filter:blur(6px);overflow:hidden;display:flex;flex-direction:column;
  opacity:0;transform:translateY(14px);animation:rise .6s cubic-bezier(.2,.8,.2,1) forwards}
#topbar{animation-delay:.03s}#status-panel{animation-delay:.1s}
#right-panel{animation-delay:.16s}#chat-panel{animation-delay:.22s}
@keyframes rise{to{opacity:1;transform:none}}
/* top bar */
#topbar{grid-area:top;flex-direction:row;align-items:center;padding:0 22px;gap:14px}
#topbar h1{font-family:'Baloo 2',cursive;font-size:22px;color:var(--grape)}
#clock{font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;color:var(--ink-dim);margin-left:auto}
.pill{font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;padding:5px 13px;border-radius:99px;
  background:#eee;color:var(--ink-dim);letter-spacing:.02em}
.pill.on{background:#d7f9e9;color:#1f9d64}
.pill.err{background:#ffe0e0;color:var(--coral)}
/* section headers */
h2{font-family:'Baloo 2',cursive;font-size:14px;color:var(--grape);padding:14px 18px 8px}
.scroll{overflow-y:auto;flex:1;padding:6px 16px 14px;scrollbar-width:thin}
/* left: status */
#status-panel{grid-area:left}
.stat{display:flex;justify-content:space-between;align-items:baseline;padding:8px 4px;
  border-bottom:2px dashed #eee2f7;font-size:13px;font-weight:700}
.stat b{color:var(--mint);font-size:13px}
.stat b.warn{color:var(--sun)} .stat b.err{color:var(--coral)}
/* right: facts + notifications */
#right-panel{grid-area:right;gap:0}
.notif{display:flex;gap:9px;align-items:flex-start;padding:9px 4px;font-size:12.5px;line-height:1.45;
  font-weight:600;border-bottom:2px dashed #eee2f7}
.notif .dot{width:9px;height:9px;border-radius:50%;margin-top:4px;flex-shrink:0}
.notif.ok .dot{background:var(--mint)} .notif.warn .dot{background:var(--sun)} .notif.critical .dot{background:var(--coral)}
.fact{padding:9px 4px;border-bottom:2px dashed #eee2f7;font-size:12.5px;line-height:1.45;font-weight:600}
.fact .meta{font-size:10px;color:var(--ink-dim);font-weight:800;text-transform:uppercase;margin-bottom:3px}
/* chat */
#chat-panel{grid-area:chat}
#chat-log{flex:1;overflow-y:auto;padding:14px 20px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:72%;padding:11px 16px;border-radius:18px;font-size:14px;font-weight:600;line-height:1.5;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--sky),var(--grape));color:#fff;border-bottom-right-radius:4px}
.msg.janet{align-self:flex-start;background:#fff;border:2px solid #f0e6ff;border-bottom-left-radius:4px}
.msg .tag{display:block;font-size:9.5px;font-weight:800;color:var(--ink-dim);margin-top:6px;text-transform:uppercase;opacity:.7}
#chat-form{display:flex;gap:10px;padding:12px 16px;border-top:2px solid #f3ecff}
#chat-input{flex:1;background:#f7f3ff;border:2px solid #f0e6ff;border-radius:14px;
  color:var(--ink);font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;padding:11px 16px;outline:none}
#chat-input:focus{border-color:var(--grape)}
select,#send-btn{background:#f7f3ff;border:2px solid #f0e6ff;color:var(--ink-dim);font-weight:800;
  border-radius:14px;font-family:'Nunito',sans-serif;font-size:11px;padding:0 14px;cursor:pointer}
#send-btn{background:linear-gradient(135deg,var(--coral),var(--sun));color:#fff;letter-spacing:.05em}
#send-btn:hover{filter:brightness(1.08)}
/* core: Janet blob */
#core{grid-area:core;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
#blob-wrap{position:relative;width:min(46vh,320px);height:min(46vh,320px)}
#blob-shadow{position:absolute;left:50%;bottom:-6%;width:60%;height:9%;transform:translateX(-50%);
  background:radial-gradient(ellipse at center,rgba(80,60,120,.24),transparent 70%);border-radius:50%}
#blob{position:absolute;inset:0;
  background:linear-gradient(150deg,var(--coral),var(--sun) 45%,var(--mint) 100%);
  border-radius:42% 58% 63% 37% / 45% 45% 55% 55%;
  box-shadow:inset -14px -18px 40px rgba(0,0,0,.12), inset 10px 10px 30px rgba(255,255,255,.35);
  animation:breathe 3.4s ease-in-out infinite, morph 9s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-3%) scale(1.015,.985)}}
@keyframes morph{
  0%,100%{border-radius:42% 58% 63% 37% / 45% 45% 55% 55%}
  33%{border-radius:58% 42% 40% 60% / 55% 60% 40% 45%}
  66%{border-radius:48% 52% 55% 45% / 40% 55% 45% 60%}
}
#face{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8%}
#eyes{display:flex;gap:16%}
.eye{width:15%;aspect-ratio:1;background:#3a3355;border-radius:50%;position:relative;animation:blink 4.2s ease-in-out infinite}
.eye::after{content:"";position:absolute;top:18%;left:20%;width:32%;height:32%;background:#fff;border-radius:50%}
@keyframes blink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.12)}}
.cheek{position:absolute;width:13%;aspect-ratio:1;background:rgba(255,255,255,.55);border-radius:50%;top:52%;filter:blur(1px)}
.cheek.l{left:8%} .cheek.r{right:8%}
#mouth{width:22%;height:12%;border:0;border-bottom:5px solid #3a3355;border-radius:0 0 50% 50%;
  transition:all .25s ease}
#janet-state-label{margin-top:18px;font-family:'Baloo 2',cursive;font-size:15px;color:var(--grape);
  background:var(--panel);padding:5px 18px;border-radius:99px;box-shadow:var(--shadow);letter-spacing:.03em;text-transform:capitalize}
/* state: idle (default above) */
#blob-wrap.thinking #blob{animation:breathe 1.1s ease-in-out infinite, morph 2.4s ease-in-out infinite, spin 3s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
#blob-wrap.thinking #face{animation:none}
#blob-wrap.thinking #mouth{width:11%;height:11%;border:5px solid #3a3355;border-radius:50%}
#blob-wrap.thinking .eye{animation:none;transform:translateY(-10%)}
#blob-wrap.speaking #blob{animation:breathe 1.6s ease-in-out infinite, morph 9s ease-in-out infinite}
#blob-wrap.speaking #mouth{animation:talk .28s ease-in-out infinite}
@keyframes talk{0%,100%{height:12%;border-radius:0 0 50% 50%}50%{height:26%;border-radius:50%}}
.spark{position:absolute;font-size:20px;opacity:0;pointer-events:none;animation:sparkle 1.6s ease-out forwards}
@keyframes sparkle{0%{opacity:0;transform:translateY(0) scale(.4)}20%{opacity:1}100%{opacity:0;transform:translateY(-60px) scale(1.1)}}
/* mobile */
@media(max-width:900px){
  #hud{grid-template-columns:1fr;grid-template-rows:56px 40vh auto 1fr;
    grid-template-areas:"top" "core" "right" "chat"}
  #status-panel{display:none}
  .msg{max-width:88%}
}
</style>
</head>
<body>
<div id="hud">
  <div class="panel" id="topbar">
    <h1>🚀 Mission Control</h1>
    <span class="pill" id="pill-redis">REDIS</span>
    <span class="pill" id="pill-bot">TG BOT</span>
    <span class="pill" id="pill-nvidia">NVIDIA</span>
    <span class="pill" id="pill-budget">$0.00</span>
    <span id="clock">--:--:--</span>
  </div>

  <div class="panel" id="status-panel">
    <h2>Σύστημα · sinefoulis</h2>
    <div class="scroll" id="status-body"></div>
  </div>

  <div id="core">
    <div id="blob-wrap">
      <div id="blob-shadow"></div>
      <div id="blob">
        <div id="face">
          <div id="eyes"><div class="eye"></div><div class="eye"></div></div>
          <div id="mouth"></div>
        </div>
        <div class="cheek l"></div><div class="cheek r"></div>
      </div>
    </div>
    <div id="janet-state-label">Janet · idle</div>
  </div>

  <div class="panel" id="right-panel">
    <h2>Ειδοποιήσεις</h2>
    <div class="scroll" id="notif-body" style="max-height:38%"></div>
    <h2>Κοινή μνήμη</h2>
    <div class="scroll" id="facts-body"></div>
  </div>

  <div class="panel" id="chat-panel">
    <div id="chat-log">
      <div class="msg janet">Γεια σου Alex! Όλα online και έτοιμη για δουλειά 🎈<span class="tag">janet · nemotron</span></div>
    </div>
    <form id="chat-form">
      <select id="mode">
        <option value="auto">AUTO</option>
        <option value="fast">FAST · 8B</option>
        <option value="main">MAIN · 49B</option>
        <option value="deep">DEEP · 122B</option>
        <option value="claude">CLAUDE ⚡</option>
      </select>
      <input id="chat-input" placeholder="Μίλα στην Janet… (/remember για μνήμη)" autocomplete="off">
      <button id="send-btn" type="submit">Send</button>
    </form>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

/* ═══════════════ Janet blob state machine ═══════════════ */
const blobWrap = $('blob-wrap');
function setJanet(mode){ // idle | thinking | speaking
  blobWrap.className = mode === 'idle' ? '' : mode;
  $('janet-state-label').textContent = 'Janet · ' + mode;
}
function sparkle(){
  const s = document.createElement('div');
  s.className = 'spark'; s.textContent = ['✨','⭐','💫'][Math.floor(Math.random()*3)];
  s.style.left = (20+Math.random()*60)+'%'; s.style.top = (10+Math.random()*20)+'%';
  blobWrap.appendChild(s);
  setTimeout(()=>s.remove(), 1700);
}
setInterval(()=>{ if(Math.random()<.4) sparkle(); }, 3500);

/* ═══════════════ clock ═══════════════ */
function tickClock(){ $('clock').textContent = new Date().toLocaleTimeString('el-GR',{hour12:false}); }
setInterval(tickClock, 1000); tickClock();

/* ═══════════════ fetch with timeout ═══════════════ */
async function fetchJSON(url, opts={}, timeoutMs=20000){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), timeoutMs);
  try{
    const res = await fetch(url, {...opts, signal: ctrl.signal});
    return await res.json();
  } finally { clearTimeout(t); }
}

/* ═══════════════ HUD data ═══════════════ */
async function refreshStatus(){
  try{
    const st = await fetchJSON('/api/status', {}, 8000);
    $('pill-redis').className = 'pill ' + (st.redis==='connected'?'on':'err');
    $('pill-bot').className = 'pill ' + (st.services['telegram-agent']==='active'?'on':'err');
    $('pill-nvidia').className = 'pill ' + (st.nvidia_key?'on':'err');
    $('pill-budget').textContent = `$${st.spend_today_usd.toFixed(2)} / $${st.budget_usd.toFixed(2)}`;
    $('pill-budget').className = 'pill ' + (st.spend_today_usd > st.budget_usd*.8 ? 'err':'');
    const rows = [
      ['CPU TEMP', st.cpu_temp_c!=null? st.cpu_temp_c+'°C':'—', st.cpu_temp_c>75?'warn':''],
      ['LOAD 1M', st.load_1m!=null? st.load_1m.toFixed(2):'—', ''],
      ['DISK', st.disk_used_pct+'%', st.disk_used_pct>85?'warn':''],
      ['UPTIME', st.uptime||'—', ''],
      ['TG BOT', st.services['telegram-agent'], st.services['telegram-agent']!=='active'?'err':''],
      ['TAILSCALE', st.services['tailscaled'], st.services['tailscaled']!=='active'?'err':''],
      ['REDIS', st.redis, st.redis!=='connected'?'err':''],
      ['CLAUDE KEY', st.claude_key?'set':'not set', ''],
    ];
    try{
      const ks = await fetchJSON('/api/knowledge/stats', {}, 8000);
      rows.push(['🧠 FACTS', ks.facts_indexed, '']);
      rows.push(['🧠 VAULT CHUNKS', ks.vault_chunks, '']);
      rows.push(['🧠 INDEX SIZE', ks.db_mb+' MB', '']);
    }catch(e){}
    $('status-body').innerHTML = rows.map(([k,v,c])=>
      `<div class="stat"><span>${k}</span><b class="${c}">${v}</b></div>`).join('');
  }catch(e){
    $('status-body').innerHTML = '<div class="stat"><span>backend offline</span><b class="err">✕</b></div>';
  }
}
async function refreshNotifs(){
  try{
    const d = await fetchJSON('/api/notifications', {}, 8000);
    $('notif-body').innerHTML = d.notifications.map(n=>
      `<div class="notif ${n.level}"><span class="dot"></span><span>${escapeHtml(n.text)}</span></div>`).join('');
  }catch(e){}
}
async function refreshFacts(){
  try{
    const d = await fetchJSON('/api/facts?limit=20', {}, 8000);
    $('facts-body').innerHTML = d.facts.length ? d.facts.map(f=>{
      const dt = new Date(f.timestamp).toLocaleString('el-GR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      return `<div class="fact"><div class="meta">${dt} · ${escapeHtml(f.source)} · ${escapeHtml(f.category)}</div>${escapeHtml(f.content)}</div>`;
    }).join('') : '<div class="fact"><div class="meta">empty</div>Καμία εγγραφή ακόμα — γράψε /remember στο chat.</div>';
  }catch(e){}
}
function escapeHtml(s){
  const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML;
}
refreshStatus(); refreshNotifs(); refreshFacts();
setInterval(refreshStatus, 15000);
setInterval(refreshNotifs, 30000);
setInterval(refreshFacts, 30000);

/* ═══════════════ Janet chat ═══════════════ */
const history = [];
$('chat-form').addEventListener('submit', async e=>{
  e.preventDefault();
  const input = $('chat-input');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  addMsg('user', text);

  if(text.startsWith('/remember ')){
    const content = text.slice(10);
    try{
      await fetchJSON('/api/remember', {method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({content, category:'general'})}, 10000);
      addMsg('janet','✅ Αποθηκεύτηκε στη shared memory — θα συγχρονιστεί στο vault στο επόμενο nightly.','memory');
      refreshFacts();
    }catch(err){
      addMsg('janet','⚠️ Δεν μπόρεσα να το αποθηκεύσω — δοκίμασε ξανά.','error');
    }
    return;
  }

  history.push({role:'user', content:text});
  setJanet('thinking');
  try{
    const d = await fetchJSON('/api/chat', {method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:history.slice(-12), mode:$('mode').value})}, 30000);
    history.push({role:'assistant', content:d.reply});
    setJanet('speaking');
    addMsg('janet', d.reply, `${d.provider} · ${d.model.split('/').pop()}`);
    setTimeout(()=>setJanet('idle'), 2200);
  }catch(err){
    setJanet('idle');
    const msg = err.name === 'AbortError'
      ? '⚠️ Άργησε πολύ να απαντήσει (>30s) — δοκίμασε ξανά ή άλλαξε mode.'
      : '⚠️ Backend δεν απαντά — τσέκαρε αν τρέχει το uvicorn στο Pi.';
    addMsg('janet', msg, 'error');
  }
});
function addMsg(who, text, tag){
  const log = $('chat-log');
  const div = document.createElement('div');
  div.className = 'msg '+who;
  div.textContent = text;
  if(tag){const t=document.createElement('span');t.className='tag';t.textContent=tag;div.appendChild(t);}
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}
</script>
</body>
</html>
